{% extends "base.html" %}

{% block content %}
<h2 class="mb-4">Список книг</h2>

{% if books %}
    <div class="row">
        {% for book in books %}
            <div class="col-md-6 mb-3">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">{{ book.title }}</h5>
                        <h6 class="card-subtitle mb-2 text-muted">{{ book.author }}</h6>
                        <p class="card-text">
                            <strong>Год:</strong> {{ book.year }}<br>

                        </p>
                        <a href="{{ url_for('book_detail', book_id=book.id) }}" class="btn btn-sm btn-primary">Подробнее</a>
                    </div>
                </div>
            </div>
        {% endfor %}
    </div>
{% else %}
    <p class="alert alert-info">В каталоге пока нет книг</p>
{% endif %}
{% endblock %}
